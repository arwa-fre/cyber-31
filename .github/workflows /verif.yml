name: Verify HTML

on:
  push:
    branches:
      - main

jobs:
  verify-html:
    runs-on:
      - self-hosted
      - linux
      - x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if index.html exists
        run: |
          if [ -f index.html ]; then
            echo "index.html found"
          else
            echo "index.html missing"
            exit 1
          fi
